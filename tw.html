<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pg-title">台股即時動態</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#18181b;--card:#1c1c1f;--border:#27272a;
  --text:#fafafa;--muted:#71717a;--sub:#a1a1aa;
  --accent:#2563eb;--accent-dim:#1e3a5f;--accent-border:#1d4ed8;
  --red:#f43f5e;--green:#22c55e;--yellow:#f59e0b;
  --red-dim:#4c0519;--green-dim:#052e16;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
.hd-left{display:flex;align-items:center;gap:14px}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:-1px;}
.company-name{font-size:17px;font-weight:700}
.company-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hd-right{display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-dim);border:1px solid #166534;padding:4px 10px;border-radius:20px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-badge span{font-size:11px;font-weight:700;color:var(--green)}
.live-badge.off{background:#1a1a1a;border-color:var(--border)}
.live-badge.off .live-dot{background:var(--muted);animation:none}
.live-badge.off span{color:var(--muted)}
#update-time{font-size:12px;color:var(--muted)}
.body{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 57px);overflow:hidden}
.left{border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.left::-webkit-scrollbar{width:4px}
.left::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.price-card{background:linear-gradient(145deg,var(--accent-dim),#1c1c1f);border:1px solid var(--accent-border);border-radius:14px;padding:20px;}
.price-tag{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.price-main{font-size:44px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:8px;letter-spacing:-1px}
.price-change{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:12px;}
.price-change.up{background:var(--red-dim);color:var(--red)}
.price-change.down{background:var(--green-dim);color:var(--green)}
.price-change.flat{background:#27272a;color:var(--muted)}
.market-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:14px;}
.market-badge.open{background:#052e16;color:var(--green);border:1px solid #166534}
.market-badge.closed{background:#27272a;color:var(--muted);border:1px solid var(--border)}
.divider{height:1px;background:var(--border);margin:14px 0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.countdown{margin-top:14px}
.cd-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px}
.cd-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 1s linear}
.cd-txt{font-size:11px;color:var(--muted);text-align:right}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12px;}
.info-lbl{color:var(--muted)}
.info-val{font-weight:600;font-variant-numeric:tabular-nums}
.right{display:flex;flex-direction:column;overflow:hidden}
.news-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.news-hd-left{display:flex;align-items:center;gap:8px}
.news-hd h2{font-size:14px;font-weight:700}
.news-hd-count{font-size:11px;font-weight:700;background:var(--accent);color:#fff;padding:2px 7px;border-radius:10px;}
.refresh-btn{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;}
.refresh-btn:hover{color:var(--text);border-color:var(--sub)}
.news-scroll{flex:1;overflow-y:auto;padding:12px}
.news-scroll::-webkit-scrollbar{width:4px}
.news-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ni{display:flex;flex-direction:column;gap:6px;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card);margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color .15s,background .15s;}
.ni:hover{border-color:#52525b;background:#1f1f23}
.ni.fresh{border-color:var(--green);animation:pop .35s ease}
@keyframes pop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ni-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ni-src{font-size:10px;font-weight:700;color:var(--muted);background:#27272a;padding:2px 7px;border-radius:4px}
.ni-ago{font-size:11px;color:var(--muted)}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.b-hot{background:#3b1219;color:var(--red)}
.b-new{background:#052e16;color:var(--green)}
.ni-title{font-size:13px;font-weight:600;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty .ico{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px;color:var(--sub)}
.empty small{font-size:12px;margin-top:4px;display:block;opacity:.7}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:700px){.body{grid-template-columns:1fr;height:auto}.left{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<header>
  <div class="hd-left">
    <div class="logo" id="logo">--</div>
    <div>
      <div class="company-name" id="co-name">載入中...</div>
      <div class="company-sub" id="co-sub">--</div>
    </div>
  </div>
  <div class="hd-right">
    <div class="live-badge off" id="live-badge"><div class="live-dot"></div><span>載入中</span></div>
    <div id="update-time">--</div>
  </div>
</header>

<div class="body">
  <div class="left">
    <div class="price-card">
      <div class="price-tag">股價 · TWD</div>
      <div class="price-main" id="price">--</div>
      <div class="price-change flat" id="change">-- (--%)</div>
      <div class="market-badge closed" id="mkt-badge">盤後</div>
      <div class="divider"></div>
      <div class="stats">
        <div><div class="stat-lbl">開盤</div><div class="stat-val" id="s-o">---</div></div>
        <div><div class="stat-lbl">昨收</div><div class="stat-val" id="s-pc">---</div></div>
        <div><div class="stat-lbl">今日高</div><div class="stat-val" id="s-h" style="color:var(--red)">---</div></div>
        <div><div class="stat-lbl">今日低</div><div class="stat-val" id="s-l" style="color:var(--green)">---</div></div>
      </div>
      <div class="countdown">
        <div class="cd-bar"><div class="cd-fill" id="cd-fill"></div></div>
        <div class="cd-txt" id="cd-txt">-- 秒後更新</div>
      </div>
    </div>

    <div class="info-card">
      <div class="card-hd">成交資訊</div>
      <div class="info-row"><span class="info-lbl">成交量</span><span class="info-val" id="i-vol">---</span></div>
      <div class="info-row"><span class="info-lbl">漲跌幅</span><span class="info-val" id="i-pct">---%</span></div>
      <div class="info-row"><span class="info-lbl">資料日期</span><span class="info-val" id="i-date">---</span></div>
    </div>
  </div>

  <div class="right">
    <div class="news-hd">
      <div class="news-hd-left">
        <h2>最新消息</h2>
        <span class="news-hd-count" id="n-cnt">0</span>
      </div>
      <button class="refresh-btn" id="ref-btn">↻ 刷新</button>
    </div>
    <div class="news-scroll" id="news-list">
      <div class="empty"><div class="spin"></div><p>載入中...</p></div>
    </div>
  </div>
</div>

<script>
const q=new URLSearchParams(location.search);
const SYM=q.get('s')||'2330';
const NAME=q.get('n')||'台積電';
const SEC=q.get('sec')||'半導體製造';

const COLORS={
  '2330':{a:'#2563eb',dim:'#1e3a5f',border:'#1d4ed8'},
  '3592':{a:'#059669',dim:'#052e16',border:'#065f46'},
};
const C=COLORS[SYM]||{a:'#0ea5e9',dim:'#0c4a6e',border:'#0369a1'};
document.documentElement.style.setProperty('--accent',C.a);
document.documentElement.style.setProperty('--accent-dim',C.dim);
document.documentElement.style.setProperty('--accent-border',C.border);

document.getElementById('pg-title').textContent=SYM+' '+NAME+' 即時動態';
document.getElementById('logo').textContent=SYM;
document.getElementById('co-name').textContent=NAME;
document.getElementById('co-sub').textContent=SYM+' · TWSE · '+SEC;

const $=id=>document.getElementById(id);
let cd=60,seen=new Set();

function isMarketOpen(){
  const tw=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const day=tw.getDay(),mins=tw.getHours()*60+tw.getMinutes();
  return day>=1&&day<=5&&mins>=540&&mins<=810;
}

function setMarketBadge(){
  const open=isMarketOpen();
  $('mkt-badge').className='market-badge '+(open?'open':'closed');
  $('mkt-badge').textContent=open?'盤中':'盤後';
}

// 嘗試直接取得 + CORS proxy 備援
async function twseFetch(){
  const url=['https://openapi.',
             'twse.com.tw/v1/',
             'exchangeReport/STOCK_DAY_ALL'].join('');
  // 先直接嘗試
  try{
    const r=await fetch(url,{cache:'no-store',mode:'cors'});
    if(r.ok)return await r.json();
  }catch(_){}
  // 備援：透過 proxy
  const px='https://corsproxy.io/?'+encodeURIComponent(url);
  const r2=await fetch(px,{cache:'no-store'});
  return await r2.json();
}

async function fetchPrice(){
  try{
    const data=await twseFetch();
    const it=data.find(x=>x.Code===SYM);
    if(!it)throw new Error('股票代號不存在');

    const pr=parseFloat(it.ClosingPrice);
    const rawCh=(it.Change||'0').replace(/\s/g,'').replace(/^\+/,'');
    const ch=parseFloat(rawCh)||0;
    const prev=pr-ch;
    const pct=prev>0?(ch/prev*100):0;

    $('price').textContent=pr.toFixed(2);
    const s=ch>=0?'+':'';
    const el=$('change');
    el.textContent=`${s}${ch.toFixed(2)} (${s}${pct.toFixed(2)}%)`;
    el.className='price-change '+(ch>0?'up':ch<0?'down':'flat');

    $('s-o').textContent=parseFloat(it.OpeningPrice||0).toFixed(2);
    $('s-pc').textContent=prev.toFixed(2);
    $('s-h').textContent=parseFloat(it.HighestPrice||0).toFixed(2);
    $('s-l').textContent=parseFloat(it.LowestPrice||0).toFixed(2);

    const vol=parseInt((it.TradeVolume||'0').replace(/,/g,''));
    $('i-vol').textContent=(vol/1000).toLocaleString('zh-TW',{maximumFractionDigits:0})+' 張';
    $('i-pct').textContent=(ch>=0?'+':'')+pct.toFixed(2)+'%';

    const dt=it.Date||'';
    $('i-date').textContent=dt.length===8?dt.slice(0,4)+'/'+dt.slice(4,6)+'/'+dt.slice(6,8):'---';

    $('update-time').textContent='更新 '+new Date().toLocaleTimeString('zh-TW');
    setMarketBadge();
    live(true);cd=60;
  }catch(e){
    live(false);
    console.error('fetchPrice error:',e);
  }
}

// 新聞：嘗試 corsproxy.io → 備援 allorigins
async function fetchNews(){
  if(!seen.size)$('news-list').innerHTML='<div class="empty"><div class="spin"></div><p>載入新聞中...</p></div>';
  const rss='https://news.google.com/rss/search?q='+
    encodeURIComponent(NAME+' '+SYM+' 股票')+'&hl=zh-TW&gl=TW&ceid=TW:zh-Hant';

  let contents=null;
  const proxies=[
    'https://corsproxy.io/?'+encodeURIComponent(rss),
    'https://api.allorigins.win/get?url='+encodeURIComponent(rss),
  ];

  for(const px of proxies){
    try{
      const r=await fetch(px,{cache:'default'});
      const j=await r.json();
      contents=j.contents||j;
      if(typeof contents==='string'&&contents.includes('<item>'))break;
      contents=null;
    }catch(_){contents=null;}
  }

  if(!contents){
    $('news-list').innerHTML=`<div class="empty"><div class="ico">📰</div><p>新聞暫時無法載入</p><small><a href="https://news.google.com/search?q=${encodeURIComponent(NAME+' '+SYM)}&hl=zh-TW" target="_blank" style="color:var(--accent)">在 Google 新聞搜尋 →</a></small></div>`;
    return;
  }

  try{
    const xml=new DOMParser().parseFromString(contents,'text/xml');
    const items=[...xml.querySelectorAll('item')];
    renderNews(items);
  }catch(_){
    $('news-list').innerHTML='<div class="empty"><div class="ico">⚠️</div><p>新聞解析失敗</p></div>';
  }
}

function renderNews(items){
  $('n-cnt').textContent=items.length;
  const list=$('news-list');list.innerHTML='';
  if(!items.length){list.innerHTML='<div class="empty"><div class="ico">📭</div><p>暫無消息</p></div>';return;}
  items.slice(0,40).forEach(item=>{
    const title=(item.querySelector('title')?.textContent||'').replace(/ - .+$/,'').trim();
    const link=item.querySelector('link')?.nextSibling?.textContent||
               item.querySelector('link')?.textContent||'#';
    const pubDate=item.querySelector('pubDate')?.textContent||'';
    const src=item.querySelector('source')?.textContent||'新聞媒體';
    const age=(Date.now()-new Date(pubDate))/1000;
    const isNew=!seen.has(title);
    if(isNew)seen.add(title);
    const a=document.createElement('a');
    a.className='ni'+(isNew&&seen.size>1?' fresh':'');
    a.href=link;a.target='_blank';a.rel='noopener';
    a.innerHTML=`<div class="ni-meta"><span class="ni-src">${src}</span><span class="ni-ago">${age2txt(age)}</span>${age<3600?'<span class="badge b-hot">🔥 最新</span>':age<86400?'<span class="badge b-new">今日</span>':''}</div><div class="ni-title">${title}</div>`;
    list.appendChild(a);
  });
}

function age2txt(s){
  if(s<60)return '剛剛';if(s<3600)return Math.floor(s/60)+' 分鐘前';
  if(s<86400)return Math.floor(s/3600)+' 小時前';return Math.floor(s/86400)+' 天前';
}
function live(on){
  const b=$('live-badge');
  b.className='live-badge'+(on?'':' off');
  b.querySelector('span').textContent=on?'資料已更新':'離線';
}

$('ref-btn').onclick=()=>fetchNews();
fetchPrice();
fetchNews();
setInterval(fetchPrice,60000);
setInterval(fetchNews,300000);
setInterval(()=>{
  cd=Math.max(0,cd-1);
  $('cd-fill').style.width=(cd/60*100)+'%';
  $('cd-txt').textContent=cd?cd+' 秒後更新':'更新中...';
},1000);
</script>
</body>
</html>
